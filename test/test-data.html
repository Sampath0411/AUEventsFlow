<!DOCTYPE html><html><head><title>AU Events Test</title></head><body><script> 
var id='EVT'+Date.now().toString(36).toUpperCase(); 
var org='ORG'+Date.now().toString(36).toUpperCase(); 
var d=new Date(); d.setDate(d.getDate()+14); 
var dl=new Date(); dl.setDate(dl.getDate()+12); 
var e={id:id,name:'Tech Conference 2026',description:'Amazing tech event.',date:d.toISOString().slice(0,16),deadline:dl.toISOString().slice(0,16),location:'Anna University Main Auditorium',category:'Workshop',contactEmail:'test@au.edu',contactPhone:'9876543210',banner:'',organizerId:org}; 
localStorage.setItem('ef_events',JSON.stringify([e])); 
localStorage.setItem('ef_organizer_id',org); 
document.body.innerHTML='<h1 style=\"color:#4ade80;font-family:Arial\">Event Created!</h1><p style=\"font-family:Arial\">Opening event page...</p>'; 
setTimeout(function(){window.location='../index.html#event/'+id},1500); 
</script></body></html>
