<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventFlow Auto Test</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  background: #1a1a1a;
  color: #fff;
}
h1 { color: #d4a574; }
.log {
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 16px;
  margin: 16px 0;
  font-family: monospace;
  font-size: 13px;
  max-height: 400px;
  overflow-y: auto;
}
.log-entry { margin: 8px 0; padding: 4px 0; border-bottom: 1px solid #222; }
.log-entry.success { color: #4ade80; }
.log-entry.error { color: #f87171; }
.log-entry.info { color: #888; }
.log-entry.action { color: #d4a574; }
.btn {
  padding: 12px 24px;
  background: #d4a574;
  color: #000;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin: 8px 8px 8px 0;
}
.btn:hover { opacity: 0.9; }
.status {
  padding: 12px 16px;
  border-radius: 8px;
  margin: 16px 0;
}
.status.running { background: rgba(212,165,116,0.2); border: 1px solid #d4a574; }
.status.done { background: rgba(74,222,128,0.2); border: 1px solid #4ade80; }
.status.waiting { background: rgba(136,136,136,0.2); border: 1px solid #888; }
</style>
</head>
<body>
<h1>EventFlow Auto Test</h1>
<p>Automated testing for EventFlow - creates event and tests registration</p>

<div id="status" class="status waiting">
  <strong>Status:</strong> <span id="statusText">Ready to start</span>
</div>

<button class="btn" onclick="runFullTest()">Run Full Test</button>
<button class="btn" onclick="openMainSite()">Open Main Site</button>
<button class="btn" onclick="clearAllData()">Clear All Data</button>

<div class="log" id="log"></div>

<script>
const MAIN_URL = '../index.html';
let testWindow = null;

function log(msg, type = 'info') {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, className) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('status').className = 'status ' + className;
}

function openMainSite() {
  log('Opening EventFlow...', 'info');
  window.open(MAIN_URL, '_blank');
}

function clearAllData() {
  localStorage.removeItem('ef_events');
  localStorage.removeItem('ef_regs');
  localStorage.removeItem('ef_organizer_id');
  log('All data cleared!', 'success');
}

async function runFullTest() {
  const btns = document.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);

  setStatus('Running tests...', 'running');
  log('Starting automated test...', 'action');

  try {
    // Step 1: Clear existing data
    log('Step 1: Clearing existing data...', 'info');
    clearAllData();
    await sleep(500);

    // Step 2: Create organizer ID and sample event
    log('Step 2: Creating test data...', 'action');
    const orgId = 'TEST' + Date.now().toString(36).toUpperCase();
    localStorage.setItem('ef_organizer_id', orgId);
    log('Created organizer ID: ' + orgId, 'success');

    // Create sample event
    const futureDate = new Date();
    futureDate.setDate(futureDate.getDate() + 14);
    const deadline = new Date();
    deadline.setDate(deadline.setDate(deadline.getDate() + 12));

    const sampleEvent = {
      id: 'AUTO' + Date.now().toString(36).toUpperCase(),
      name: 'Auto Test Conference 2026',
      description: 'This is an automatically created test event for testing purposes.',
      date: futureDate.toISOString().slice(0, 16),
      deadline: deadline.toISOString().slice(0, 16),
      location: 'Auto Test Convention Center',
      capacity: '100',
      category: 'Conference',
      pricing: 'paid',
      price: '499',
      contact: 'test@autotest.com',
      banner: '',
      organizerId: orgId,
      createdAt: new Date().toISOString()
    };

    localStorage.setItem('ef_events', JSON.stringify([sampleEvent]));
    log('Created event: ' + sampleEvent.name, 'success');
    log('Event ID: ' + sampleEvent.id, 'info');

    // Step 3: Open main site and verify event
    log('Step 3: Opening main site...', 'action');
    testWindow = window.open(MAIN_URL, 'EventFlowTest');

    await sleep(2000);
    log('Waiting for page to load...', 'info');
    await sleep(1000);

    // Step 4: Open admin login
    log('Step 4: Navigating to admin login...', 'action');
    testWindow.location.hash = '';
    testWindow.postMessage({action: 'clickOrganizer'}, '*');
    await sleep(1000);

    // Step 5: Login
    log('Step 5: Logging in as admin...', 'action');
    testWindow.postMessage({action: 'login', user: 'admin', pass: 'admin123'}, '*');
    await sleep(1000);

    // Step 6: Navigate to events
    log('Step 6: Viewing events...', 'info');
    await sleep(1000);

    // Step 7: Create registration (simulate user)
    log('Step 7: Creating test registration...', 'action');

    const registration = {
      id: 'REG' + Date.now().toString(36).toUpperCase(),
      eventId: sampleEvent.id,
      eventName: sampleEvent.name,
      name: 'Test User',
      email: 'testuser@example.com',
      phone: '9876543210',
      msg: 'Auto test registration',
      time: new Date().toISOString(),
      seen: false
    };

    const regs = [registration];
    localStorage.setItem('ef_regs', JSON.stringify(regs));
    log('Created registration for Test User', 'success');

    // Step 8: Verify data
    log('Step 8: Verifying data...', 'action');
    await sleep(500);

    const savedEvents = JSON.parse(localStorage.getItem('ef_events') || '[]');
    const savedRegs = JSON.parse(localStorage.getItem('ef_regs') || '[]');

    log('Events in storage: ' + savedEvents.length, 'info');
    log('Registrations in storage: ' + savedRegs.length, 'info');

    // Step 9: Open share link in new window
    log('Step 9: Testing share link...', 'action');
    const shareUrl = window.location.origin + window.location.pathname.replace('auto-test.html', '') + '../index.html#event/' + sampleEvent.id;
    const regWindow = window.open(shareUrl, 'EventFlowRegistration');

    await sleep(2000);
    log('Opened registration page for event', 'success');

    // Done
    setStatus('Test completed! Check opened windows.', 'done');
    log('=== TEST COMPLETED ===', 'success');
    log('Windows opened:', 'info');
    log('- Main EventFlow site', 'info');
    log('- Event registration page', 'info');
    log('', 'info');
    log('Test Summary:', 'action');
    log('- Event created: ' + sampleEvent.name, 'success');
    log('- Event ID: ' + sampleEvent.id, 'success');
    log('- Registration created for: Test User', 'success');
    log('- Email: testuser@example.com', 'success');

  } catch (err) {
    log('Error: ' + err.message, 'error');
    setStatus('Test failed - see errors', 'waiting');
  }

  btns.forEach(b => b.disabled = false);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Log initial state
log('Auto-test page loaded', 'info');
log('LocalStorage events: ' + (JSON.parse(localStorage.getItem('ef_events') || '[]').length), 'info');
log('LocalStorage regs: ' + (JSON.parse(localStorage.getItem('ef_regs') || '[]').length), 'info');
</script>
</body>
</html>
