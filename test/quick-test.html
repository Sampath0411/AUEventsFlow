<!DOCTYPE html>
<html>
<head>
<title>EventFlow Quick Test</title>
<meta charset="UTF-8">
<style>
body { font-family: Arial; background: #1a1a1a; color: #fff; padding: 40px; max-width: 600px; margin: 0 auto; }
.box { background: #0d0d0d; border: 1px solid #333; padding: 20px; border-radius: 8px; margin: 20px 0; }
.success { color: #4ade80; }
.error { color: #f87171; }
.info { color: #888; }
h1 { color: #d4a574; }
button { padding: 12px 24px; background: #d4a574; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 5px; font-size: 14px; }
button:hover { opacity: 0.9; }
pre { background: #0d0d0d; padding: 10px; border-radius: 4px; overflow-x: auto; color: #888; }
.step { padding: 10px; margin: 5px 0; background: #1a1a1a; border-left: 3px solid #d4a574; }
</style>
</head>
<body>
<h1>AU Events - Quick Test</h1>

<div class="box">
  <h3>Test Actions:</h3>
  <button onclick="createEventDirect()">1. Create Test Event (Auto-fill)</button>
  <button onclick="openEventFlow()">2. Open EventFlow</button>
  <button onclick="checkData()">3. Check Saved Data</button>
  <button onclick="clearData()">4. Clear All Data</button>
</div>

<div id="result"></div>

<script>
function log(msg, type='info') {
  const el = document.getElementById('result');
  el.innerHTML += '<div class="' + type + '">' + msg + '</div>';
}

function createEventDirect() {
  const orgId = 'ORG' + Date.now().toString(36).toUpperCase();
  const eventId = 'TEST' + Date.now().toString(36).toUpperCase();

  const futureDate = new Date();
  futureDate.setDate(futureDate.getDate() + 14);

  const deadline = new Date();
  deadline.setDate(deadline.getDate() + 12);

  const event = {
    id: eventId,
    name: 'Tech Conference 2026',
    description: 'A comprehensive technology conference featuring the latest innovations and networking opportunities.',
    date: futureDate.toISOString().slice(0, 16),
    deadline: deadline.toISOString().slice(0, 16),
    location: 'Anna University Main Auditorium, Chennai',
    category: 'Conference',
    contactEmail: 'events@au.edu',
    contactPhone: '9876543210',
    banner: null,
    organizerId: orgId,
    createdAt: new Date().toISOString()
  };

  const events = JSON.parse(localStorage.getItem('ef_events') || '[]');
  events.push(event);
  localStorage.setItem('ef_events', JSON.stringify(events));
  localStorage.setItem('ef_organizer_id', orgId);

  log('<div class="step"><strong>Event Created!</strong><br>', 'success');
  log('Event ID: ' + eventId + '<br>', 'info');
  log('Name: ' + event.name + '<br>', 'info');
  log('Date: ' + event.date + '<br>', 'info');
  log('Total Events: ' + events.length + '</div>', 'success');
}

function openEventFlow() {
  window.open('../index.html', '_blank');
  log('EventFlow opened in new tab', 'info');
}

function checkData() {
  const events = JSON.parse(localStorage.getItem('ef_events') || '[]');
  const regs = JSON.parse(localStorage.getItem('ef_regs') || '[]');
  const orgId = localStorage.getItem('ef_organizer_id');

  let html = '<div class="step"><strong>Stored Data:</strong><br>';
  html += 'Organizer ID: ' + (orgId || 'none') + '<br>';
  html += 'Events: ' + events.length + '<br>';
  html += 'Registrations: ' + regs.length + '<br>';

  if (events.length > 0) {
    html += '<br><strong>Events:</strong><br>';
    events.forEach(e => {
      html += '- ' + e.name + ' (' + e.category + ')<br>';
    });
  }
  html += '</div>';
  log(html, 'info');
}

function clearData() {
  localStorage.removeItem('ef_events');
  localStorage.removeItem('ef_regs');
  localStorage.removeItem('ef_organizer_id');
  log('All data cleared!', 'success');
}

// Auto-check on load
checkData();
</script>
</body>
</html>
